author:
  name: ShopFlow Team
  email: team@shopflow.dev

server:
  host: "127.0.0.1"
  port: 3000
  sessionTimeout: 1800
  redis:
    enabled: false
    url: "redis://localhost:6379"
    prefix: "mgm:"
    embeddingCacheTtl: "30d"
  model:
    name: "Xenova/bge-m3"
    pooling: "cls"
    normalize: true
    dtype: "q8"

projects:
  api-gateway:
    projectDir: "./api-gateway"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  catalog-service:
    projectDir: "./catalog-service"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  order-service:
    projectDir: "./order-service"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  web-store:
    projectDir: "./web-store"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  admin-panel:
    projectDir: "./admin-panel"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  infra:
    projectDir: "./infra"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        enabled: false

workspaces:
  backend:
    projects: [api-gateway, catalog-service, order-service]
    graphMemory: "./.workspace-backend"
    mirrorDir: "./.workspace-backend"
    author:
      name: Backend Team
      email: backend@shopflow.dev

  frontend:
    projects: [web-store, admin-panel]
    graphMemory: "./.workspace-frontend"
    mirrorDir: "./.workspace-frontend"
    author:
      name: Frontend Team
      email: frontend@shopflow.dev

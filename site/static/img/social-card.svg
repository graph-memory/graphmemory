<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#1e1e1e"/>
  <rect x="0" y="0" width="1200" height="4" fill="#569cd6"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#569cd6" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow effect -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="url(#glow)" opacity="0.15"/>
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#569cd6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Graph nodes (logo concept scaled up) -->
  <g transform="translate(600, 230) scale(3.5)">
    <line x1="0" y1="-16" x2="-12" y2="0" stroke="#569cd6" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="-16" x2="12" y2="0" stroke="#569cd6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-12" y1="0" x2="-18" y2="16" stroke="#569cd6" stroke-width="1.5" opacity="0.4"/>
    <line x1="12" y1="0" x2="18" y2="16" stroke="#569cd6" stroke-width="1.5" opacity="0.4"/>
    <line x1="-18" y1="16" x2="0" y2="20" stroke="#569cd6" stroke-width="1.5" opacity="0.3"/>
    <line x1="18" y1="16" x2="0" y2="20" stroke="#569cd6" stroke-width="1.5" opacity="0.3"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#569cd6" stroke-width="1" opacity="0.25"/>
    <line x1="-18" y1="16" x2="18" y2="16" stroke="#569cd6" stroke-width="1" opacity="0.25"/>
    <circle cx="0" cy="-16" r="6" fill="#569cd6"/>
    <circle cx="-18" cy="16" r="6" fill="#4690ce"/>
    <circle cx="18" cy="16" r="6" fill="#4690ce"/>
    <circle cx="0" cy="20" r="4" fill="#3d87c7"/>
    <circle cx="-12" cy="0" r="4" fill="#3d87c7"/>
    <circle cx="12" cy="0" r="4" fill="#3d87c7"/>
  </g>

  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">Graph Memory</text>

  <!-- Tagline -->
  <text x="600" y="455" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.55)">Semantic graph memory for AI-powered development</text>

  <!-- Bottom accent line -->
  <rect x="500" y="500" width="200" height="2" rx="1" fill="#569cd6" opacity="0.3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <style>
    text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .title { font-size: 18px; font-weight: bold; }
    .layer { rx: 8; ry: 8; stroke: #666; stroke-width: 2; }
  </style>
  <text x="300" y="30" text-anchor="middle" class="title">TaskFlow — Layered Architecture</text>
  <rect x="50" y="50" width="500" height="60" class="layer" fill="#e3f2fd"/>
  <text x="300" y="85" text-anchor="middle">Controllers (HTTP Layer)</text>
  <rect x="50" y="130" width="500" height="60" class="layer" fill="#e8f5e9"/>
  <text x="300" y="165" text-anchor="middle">Services (Business Logic)</text>
  <rect x="50" y="210" width="500" height="60" class="layer" fill="#fff3e0"/>
  <text x="300" y="245" text-anchor="middle">Models (Data Access)</text>
  <rect x="50" y="290" width="500" height="60" class="layer" fill="#fce4ec"/>
  <text x="300" y="325" text-anchor="middle">Database / External Services</text>
  <line x1="300" y1="110" x2="300" y2="130" stroke="#999" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="190" x2="300" y2="210" stroke="#999" stroke-width="2"/>
  <line x1="300" y1="270" x2="300" y2="290" stroke="#999" stroke-width="2"/>
</svg>

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Remove trailing slash (Docusaurus trailingSlash: false)
    rewrite ^(.+)/$ $1 permanent;

    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /img/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

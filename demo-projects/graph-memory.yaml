author:
  name: ShopFlow Team
  email: team@shopflow.dev

server:
  host: "127.0.0.1"
  port: 3000
  defaultAccess: deny
  jwtSecret: "some-random-secret-string-32-plus-characters"
  accessTokenTtl: "1m"
  access:
    demo: rw
  # Demo seeds ~700 entities + relations in seconds; lift the default 600/min
  # global rate limit so re-seeding does not get throttled.
  rateLimit:
    global: 5000
    search: 600
    auth: 30

projects:
  api-gateway:
    projectDir: "./api-gateway"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  catalog-service:
    projectDir: "./catalog-service"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  order-service:
    projectDir: "./order-service"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.ts"

  web-store:
    projectDir: "./web-store"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.{ts,tsx}"

  admin-panel:
    projectDir: "./admin-panel"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        include: "src/**/*.{ts,tsx}"

  infra:
    projectDir: "./infra"
    exclude: "**/node_modules/**"
    graphs:
      docs:
        include: "docs/**/*.md"
      code:
        enabled: false

workspaces:
  backend:
    projects: [api-gateway, catalog-service, order-service]
    graphMemory: "./.workspace-backend"
    mirrorDir: "./.workspace-backend"
    author:
      name: Backend Team
      email: backend@shopflow.dev

  frontend:
    projects: [web-store, admin-panel]
    graphMemory: "./.workspace-frontend"
    mirrorDir: "./.workspace-frontend"
    author:
      name: Frontend Team
      email: frontend@shopflow.dev

